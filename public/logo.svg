<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#fe424d"/>

  <!-- Rotating compass -->
  <g>
    <animateTransform 
      attributeName="transform"
      type="rotate"
      from="0 50 50"
      to="360 50 50"
      dur="6s"
      repeatCount="indefinite"
    />

    <!-- Outer ring -->
    <circle cx="50" cy="50" r="28" fill="none" stroke="white" stroke-width="4"/>

    <!-- Needle -->
    <polygon points="50,20 58,50 50,80 42,50" fill="white"/>
  </g>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#fe424d"/>
</svg>